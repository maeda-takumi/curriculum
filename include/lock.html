<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ロック中</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      width: min(680px, 100%);
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
      padding: 40px 24px;
    }
    .lock {
      width: 72px;
      height: 72px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }
    p {
      margin: 0 0 26px;
      font-size: 18px;
      line-height: 1.7;
    }
    a {
      display: inline-block;
      background: #6f6f6f;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="card">
    <img class="lock" src="img/lock.png" alt="ロック中">
    <h1>このフェーズはまだ解放されていません</h1>
    <p>課題を提出し、フィードバックが完了すると閲覧できるようになります。</p>
    <p style="color:red;">※フェーズ1はフェーズ0の最後の章の<br>「次のフェーズへ」を押すことで解放できます</p>
    <a href="?page=index">目次ページへ戻る</a>
  </section>
</body>
</html>
